<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support HR - Offline</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      align-items: center;
      background: #f6f9ff;
      color: #0f172a;
      display: flex;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      background: #ffffff;
      border: 1px solid #bfdbfe;
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(30, 64, 175, 0.12);
      max-width: 420px;
      padding: 36px 28px;
      text-align: center;
      width: 100%;
    }

    .icon {
      align-items: center;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 18px;
      color: #2388ff;
      display: flex;
      font-size: 34px;
      height: 72px;
      justify-content: center;
      margin: 0 auto 20px;
      width: 72px;
    }

    h1 {
      color: #0f172a;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    p {
      color: #64748b;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.7;
      margin-bottom: 26px;
    }

    .retry-btn {
      background: #2388ff;
      border: 0;
      border-radius: 12px;
      color: #ffffff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      height: 46px;
      padding: 0 28px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .retry-btn:hover {
      background: #176fe0;
    }

    .retry-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">↻</div>
    <h1>Support HR đang offline</h1>
    <p>Không thể kết nối máy chủ. Vui lòng kiểm tra mạng rồi thử tải lại ứng dụng.</p>
    <button class="retry-btn" onclick="window.location.reload()">Thử lại</button>
  </div>
</body>
</html>
