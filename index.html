    <!-- Google API Scripts: async + defer to avoid render-blocking -->
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);

          if (isLocalhost) {
            navigator.serviceWorker.getRegistrations()
              .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
              .then(() => caches.keys())
              .then((keys) =>
                Promise.all(
                  keys
                    .filter((key) => key.startsWith('SupportHR-PWA-cache'))
                    .map((key) => caches.delete(key))
                )
              )
              .then(() => {
                console.log('SW disabled on localhost and old caches cleared.');
              })
              .catch((error) => {
                console.log('SW localhost cleanup failed: ', error);
              });
            return;
          }

          navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
